name: Build SEO pages

on:
  push:
    branches: [main]
    paths:
      - 'posts/*.md'
      - 'posts.json'
      - 'build.js'
      - 'package.json'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm ci
      - run: node build.js
      - name: Commit generated files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add posts/*/index.html sitemap.xml
          git diff --staged --quiet || (git commit -m "build: regenerate SEO pages and sitemap [skip ci]" && git push)
